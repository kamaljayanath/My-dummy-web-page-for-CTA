<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Landing Page</title>

    <!-- ChannelBoost User Data -->
    <script>
        window.channelBoostUser = {
            email: "user@domain.com",
            firstName: "John",
            lastName: "Doe",
            companyName: "JD Inc."
        };
    </script>

    <!-- ChannelBoost Tracking Script -->
    <script>
    (function(w,d,s,u){
        let j = d.createElement(s);
        j.async = true;
        j.src = "https://assets.channelboost.com/scripts/cts.js?uid=" + u;

        let f = d.getElementsByTagName(s)[0];
        f.parentNode.insertBefore(j,f);

    })(window,document,"script","a733e81d-99c2-4195-8e2b-631d0159e860");
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        button {
            display: block;
            width: 220px;
            padding: 15px;
            margin: 12px auto;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #007BFF;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Welcome</h2>

    <button onclick="handleClick('sign_up_button', 'https://my.channelboost.com/register')">
        Sign Up
    </button>

    <button onclick="handleClick('login_button', 'https://my.channelboost.com/login')">
        Login
    </button>

    <button onclick="handleClick('demo_button', 'https://appventory.com/')">
        Book a Demo
    </button>
</div>

<script>
function handleClick(eventName, url) {

    try {

        // Fire tracking only if available
        if (
            typeof trackify !== "undefined" &&
            typeof trackify.trackEvent === "function"
        ) {

            trackify.trackEvent(eventName);
            console.log("Tracked:", eventName);

        } else {

            console.warn("trackify not ready");

        }

    } catch (err) {

        console.error("Tracking error:", err);

    }

    // ALWAYS redirect
    window.location.href = url;
}
</script>

</body>
</html>
