<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Landing Page</title>

    <!-- ChannelBoost Tracking Script -->
    <script>
    (function(w,d,s,u){
        let j=d.createElement(s);
        j.async=true;
        j.src="https://assets.channelboost.com/scripts/cts.js?uid=" + u;
        let f=d.getElementsByTagName(s)[0];
        f.parentNode.insertBefore(j,f);
    })(window,document,"script","a733e81d-99c2-4195-8e2b-631d0159e860");
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        button {
            display: block;
            width: 220px;
            padding: 15px;
            margin: 12px auto;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #007BFF;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Welcome</h2>

    <!-- Sign Up -->
    <button onclick="handleClick('sign_up_button', 'https://my.channelboost.com/register')">
        Sign Up
    </button>

    <!-- Login -->
    <button onclick="handleClick('login_button', 'https://my.channelboost.com/login')">
        Login
    </button>

    <!-- Book a Demo -->
    <button onclick="handleClick('demo_button', 'https://appventory.com/#:~:text=Your%20Free%20Trial-,Schedule%20a%20Demo,-Intelligent%0ASystem%20Reviews')">
        Book a Demo
    </button>

</div>

<script>
function handleClick(eventName, url) {
    // Ensure tracking fires
    if (typeof trackify !== "undefined") {
        trackify.trackEvent(eventName);
        console.log("Tracked:", eventName);
    } else {
        console.warn("trackify not loaded");
    }

    // Delay redirect to allow tracking request
    setTimeout(() => {
        window.location.href = url;
    }, 250);
}
</script>

</body>
</html>
